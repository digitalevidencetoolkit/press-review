name: Daily Press Review

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 07:00 UTC, Monday–Friday
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r scraper/requirements.txt

      - name: Run press review
        run: python scraper/press_review.py
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OUTPUT_DIR: web/static/data

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/static/data/
          git diff --staged --quiet || git commit -m "data: press review $(date +%Y-%m-%d) [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm install
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          BASE_PATH: ${{ vars.BASE_PATH }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/build
